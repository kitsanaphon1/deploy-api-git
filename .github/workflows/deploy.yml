name: Deploy Microservices

on:
  push:
    branches:
      - main
    paths:
      - 'Customer/**'
      - 'Invoice/**'
      - 'Order/**'
      - 'Payment/**'

  workflow_dispatch:
    inputs:
      service:
        description: 'Select service to deploy'
        required: true
        type: choice
        options:
          - Customer
          - Invoice
          - Order
          - Payment
          - All

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set service from manual input
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SERVICE=${{ github.event.inputs.service }}" >> $GITHUB_ENV

      - name: Get changed service from push
        if: github.event_name == 'push'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            Customer:
              - Customer/**
            Invoice:
              - Invoice/**
            Order:
              - Order/**
            Payment:
              - Payment/**

      - name: Set service from push
        if: github.event_name == 'push'
        run: |
          if [ "${{ steps.changed-files.outputs.Customer_any_changed }}" == "true" ]; then SERVICE="Customer";
          elif [ "${{ steps.changed-files.outputs.Invoice_any_changed }}" == "true" ]; then SERVICE="Invoice";
          elif [ "${{ steps.changed-files.outputs.Order_any_changed }}" == "true" ]; then SERVICE="Order";
          elif [ "${{ steps.changed-files.outputs.Payment_any_changed }}" == "true" ]; then SERVICE="Payment";
          fi

          if [ -z "$SERVICE" ]; then
            echo "No matching service directory found."
            exit 1
          fi

          echo "SERVICE=$SERVICE" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy selected service
        if: env.SERVICE != 'All'
        run: |
          DOCKER_HOST_STR="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          DEPLOY_PATH="/home/${{ secrets.REMOTE_USER }}/deploy/DEPLOY-APIFORLAB"
          PROJECT_NAME=$(echo "${{ env.SERVICE }}" | tr '[:upper:]' '[:lower:]')

          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "mkdir -p $DEPLOY_PATH/${{ env.SERVICE }}"

          rsync -avz --delete --exclude '.git/' --exclude '.github/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./${{ env.SERVICE }}/ $DOCKER_HOST_STR:$DEPLOY_PATH/${{ env.SERVICE }}/

          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "
            cd $DEPLOY_PATH/${{ env.SERVICE }}
            docker compose -p '$PROJECT_NAME' up -d --remove-orphans
          "

      - name: Deploy all services
        if: env.SERVICE == 'All'
        run: |
          DOCKER_HOST_STR="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          DEPLOY_PATH="/home/${{ secrets.REMOTE_USER }}/deploy/DEPLOY-APIFORLAB"

          for SERVICE in Customer Invoice Order Payment; do
            PROJECT_NAME=$(echo "$SERVICE" | tr '[:upper:]' '[:lower:]')

            ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "mkdir -p $DEPLOY_PATH/$SERVICE"

            rsync -avz --delete --exclude '.git/' --exclude '.github/' \
              -e "ssh -o StrictHostKeyChecking=no" \
              ./$SERVICE/ $DOCKER_HOST_STR:$DEPLOY_PATH/$SERVICE/

            ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "
              cd $DEPLOY_PATH/$SERVICE
              docker compose -p '$PROJECT_NAME' up -d --remove-orphans
            "
          done