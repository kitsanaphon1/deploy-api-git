name: Deploy Microservices

on:
  push:
    # จะทำงานก็ต่อเมื่อมีการแก้ไขไฟล์ใน Folder เหล่านี้เท่านั้น
    paths:
      - 'Customer/**'
      - 'Invoice/**'
      - 'Order/**'
      - 'Payment/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # เพื่อให้เช็กได้ว่าไฟล์ไหนเปลี่ยน

      - name: Detect Changed Service
        id: detect
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^Customer/"; then
             echo "SERVICE_DIR=Customer" >> $GITHUB_ENV
             echo "PROJECT_NAME=customer" >> $GITHUB_ENV
          elif git diff --name-only HEAD^ HEAD | grep -q "^Invoice/"; then
             echo "SERVICE_DIR=Invoice" >> $GITHUB_ENV
             echo "PROJECT_NAME=invoice" >> $GITHUB_ENV
          elif git diff --name-only HEAD^ HEAD | grep -q "^Order/"; then
             echo "SERVICE_DIR=Order" >> $GITHUB_ENV
             echo "PROJECT_NAME=order" >> $GITHUB_ENV
          elif git diff --name-only HEAD^ HEAD | grep -q "^Payment/"; then
             echo "SERVICE_DIR=Payment" >> $GITHUB_ENV
             echo "PROJECT_NAME=payment" >> $GITHUB_ENV
          else
             echo "No target service changes detected."
             exit 0
          fi

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync and Deploy via SSH
        run: |
          # กำหนดตัวแปรปลายทาง
          DEPLOY_PATH="/home/${{ secrets.REMOTE_USER }}/deploy/DEPLOY-APIFORLAB"
          DOCKER_HOST_STR="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          
          echo "🚀 Deploying: ${{ env.SERVICE_DIR }}"

          # 1. สร้างโฟลเดอร์ปลายทาง
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "mkdir -p $DEPLOY_PATH/${{ env.SERVICE_DIR }}"

          # 2. Rsync ไฟล์ขึ้นเซิร์ฟเวอร์
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
            ./${{ env.SERVICE_DIR }}/ $DOCKER_HOST_STR:$DEPLOY_PATH/${{ env.SERVICE_DIR }}/

          # 3. สั่ง Docker Compose Up
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "
            set -e
            cd $DEPLOY_PATH/${{ env.SERVICE_DIR }}
            if [ -f 'docker-compose.yaml' ] || [ -f 'docker-compose.yml' ]; then
              docker compose -p '${{ env.PROJECT_NAME }}' up -d --remove-orphans
              docker ps --format 'table {{.Names}}\t{{.Status}}'
            else
              echo '❌ docker-compose.yaml not found!'
              exit 1
            fi
          "