name: Deploy Microservices

on:
  push:
    paths:
      - 'Customer/**'
      - 'Invoice/**'
      - 'Order/**'
      - 'Payment/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ดึงประวัติทั้งหมดเพื่อให้เปรียบเทียบ diff ได้แม่นยำ

      - name: Detect Changed Service
        id: detect
        run: |
          # หาชื่อโฟลเดอร์แรกที่มีการเปลี่ยนแปลง (Customer, Invoice, etc.)
          # ใช้ --name-only เพื่อดูเฉพาะชื่อไฟล์ และ cut เพื่อเอาชื่อโฟลเดอร์หลัก
          SERVICE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '/' | cut -d/ -f1 | head -n1)
          
          echo "Detected Service: $SERVICE"

          if [[ "$SERVICE" =~ ^(Customer|Invoice|Order|Payment)$ ]]; then
             echo "SERVICE_DIR=$SERVICE" >> $GITHUB_ENV
             # ทำชื่อโปรเจกต์เป็นตัวพิมพ์เล็ก (Lowercase)
             echo "PROJECT_NAME=$(echo $SERVICE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          else
             echo "❌ ไม่พบโฟลเดอร์ Service ที่ถูกต้อง หรือเป็นการแก้ไขไฟล์นอกโฟลเดอร์หลัก"
             exit 1
          fi

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync and Deploy via SSH
        run: |
          # ป้องกัน Error ถ้าตัวแปรว่าง
          if [ -z "${{ env.SERVICE_DIR }}" ]; then exit 1; fi

          DEPLOY_PATH="/home/${{ secrets.REMOTE_USER }}/deploy/DEPLOY-APIFORLAB"
          DOCKER_HOST_STR="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          
          echo "🚀 Starting Deployment for: ${{ env.SERVICE_DIR }}"

          # 1. เตรียมโฟลเดอร์ปลายทาง
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "mkdir -p $DEPLOY_PATH/${{ env.SERVICE_DIR }}"

          # 2. Rsync เฉพาะโฟลเดอร์ที่เลือก และตัด .git ออกไปเพื่อความเร็ว
          rsync -avz --delete --exclude '.git/' --exclude '.github/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./${{ env.SERVICE_DIR }}/ $DOCKER_HOST_STR:$DEPLOY_PATH/${{ env.SERVICE_DIR }}/

          # 3. สั่ง Docker Compose Up
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "
            set -e
            cd $DEPLOY_PATH/${{ env.SERVICE_DIR }}
            if [ -f 'docker-compose.yaml' ] || [ -f 'docker-compose.yml' ]; then
              echo '✅ Found configuration, deploying...'
              docker compose -p '${{ env.PROJECT_NAME }}' up -d --remove-orphans
              docker ps --filter name=${{ env.PROJECT_NAME }} --format 'table {{.Names}}\t{{.Status}}'
            else
              echo '❌ Error: docker-compose.yaml not found in '$DEPLOY_PATH/${{ env.SERVICE_DIR }}
              ls -la
              exit 1
            fi
          "