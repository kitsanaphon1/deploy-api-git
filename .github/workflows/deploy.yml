name: Deploy Microservices

on:
  push:
    paths:
      - 'Customer/**'
      - 'Invoice/**'
      - 'Order/**'
      - 'Payment/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. ใช้ Tool มาตรฐานหาว่าโฟลเดอร์ไหนเปลี่ยน
      - name: Get changed service
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            Customer:
              - Customer/**
            Invoice:
              - Invoice/**
            Order:
              - Order/**
            Payment:
              - Payment/**

      - name: Set Service Environment
        run: |
          # ตรวจสอบว่ามี Service ไหนเปลี่ยนบ้าง (เอาอันแรกที่เจอ)
          if [ "${{ steps.changed-files.outputs.Customer_any_changed }}" == "true" ]; then SERVICE="Customer";
          elif [ "${{ steps.changed-files.outputs.Invoice_any_changed }}" == "true" ]; then SERVICE="Invoice";
          elif [ "${{ steps.changed-files.outputs.Order_any_changed }}" == "true" ]; then SERVICE="Order";
          elif [ "${{ steps.changed-files.outputs.Payment_any_changed }}" == "true" ]; then SERVICE="Payment";
          fi

          if [ -n "$SERVICE" ]; then
            echo "SERVICE_DIR=$SERVICE" >> $GITHUB_ENV
            echo "PROJECT_NAME=$(echo $SERVICE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          else
            echo "❌ No matching service directory found."
            exit 1
          fi

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync and Deploy via SSH
        run: |
          DEPLOY_PATH="/home/${{ secrets.REMOTE_USER }}/deploy/DEPLOY-APIFORLAB"
          DOCKER_HOST_STR="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          
          echo "🚀 Deploying Service: ${{ env.SERVICE_DIR }}"

          # สร้างโฟลเดอร์หลักรอไว้
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "mkdir -p $DEPLOY_PATH/${{ env.SERVICE_DIR }}"

          # 2. ปรับการ Rsync (เอา / ออกจากท้ายต้นทาง เพื่อให้ copy ทั้งโฟลเดอร์ไปวาง)
          # และใช้ --delete เพื่อให้ไฟล์บน server ตรงกับบน git เป๊ะๆ
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./${{ env.SERVICE_DIR }}/ $DOCKER_HOST_STR:$DEPLOY_PATH/${{ env.SERVICE_DIR }}/

          # 3. สั่งรัน Docker
          ssh -o StrictHostKeyChecking=no $DOCKER_HOST_STR "
            set -e
            cd $DEPLOY_PATH/${{ env.SERVICE_DIR }}
            
            # ตรวจสอบไฟล์ก่อนรัน
            if [ -f 'docker-compose.yaml' ] || [ -f 'docker-compose.yml' ]; then
              echo '✅ Found configuration, deploying...'
              docker compose -p '${{ env.PROJECT_NAME }}' up -d --remove-orphans
              docker ps --filter name=${{ env.PROJECT_NAME }}
            else
              echo '❌ Error: docker-compose.yaml not found in '\$(pwd)
              ls -la
              exit 1
            fi
          "